set -g prefix C-a
bind C-a send-prefix
# -- Core Settings -------------------------------------------------------------
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
if-shell "test -x /usr/local/bin/bash" "set -g default-shell /usr/local/bin/bash" "set -g default-shell /usr/bin/bash"
if-shell "test -x /usr/local/bin/bash" "set -g default-command '/usr/local/bin/bash'" "set -g default-command '/usr/bin/bash'"
set -s escape-time 0                      # No delay for Vim
set -g history-limit 50000                # Massive scrollback
set -g display-time 4000                  # Status messages stay longer
set -g status-interval 5                  # Refresh status more often
set -g focus-events on                    # Let apps know they have focus

# -- Ergonomic Navigation ------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
# Bind C-j untuk membuka Popup Manager
# Use Vim keys to move between panes
# Popup switcher untuk pindah pane/window dengan fzf
# Versi dengan warna fzf yang lebih keren
# Popup switcher untuk pindah WINDOW dengan navigasi jk
bind-key -n C-o display-popup -E "$HOME/dotfiles/script/tmux_manager"
bind-key -n C-j if-shell -F '#{==:#{session_name},floating}' {
    detach-client
} {
display-popup -d "#{pane_current_path}" -x 0 -y 100% -w 100% -h 35% -E "tmux attach-session -t floating || tmux new-session -s floating"
}
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g base-index 1           # Start window numbering at 1
setw -g pane-base-index 1

# Easy Session Switching (The "v" you asked for)
bind v choose-tree -Zs
# -- macOS Style Floating Status Bar -------------------------------------------

# 1. Position and Centering
set -g status-position top
set -g status-justify centre
set -g status-interval 2

# 2. Transparent Background (Makes it look like it's floating)
set -g status-style "bg=default"

# 3. Left Side: Session Pill (Green)
set -g status-left-length 60
set -g status-left "#[fg=#a6e3a1,bg=default]#[fg=#11111b,bg=#a6e3a1,bold]󱫋 #S#[fg=#a6e3a1,bg=default]"

# 4. Right Side: Time Pill (Blue)
set -g status-right-length 60
set -g status-right "#[fg=#89b4fa,bg=default]#[fg=#11111b,bg=#89b4fa,bold]󱑎 %H:%M#[fg=#89b4fa,bg=default]"

# 5. Middle: Window Pills (Active = Orange, Inactive = Dark Gray)
setw -g window-status-separator "  " # Gap between pills
setw -g window-status-current-format "#[fg=#fab387,bg=default]#[fg=#11111b,bg=#fab387,bold]󰖯 #I:#W#[fg=#fab387,bg=default]"
setw -g window-status-format "#[fg=#313244,bg=default]#[fg=#cdd6f4,bg=#313244]#I:#W#[fg=#313244,bg=default]"

# -- Pane Borders (Minimalist macOS style) -------------------------------------
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
