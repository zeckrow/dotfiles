set -g prefix C-a
bind C-a send-prefix
# -- Core Settings -------------------------------------------------------------
set -g default-terminal "screen-256color" # Proper colors
set -ga terminal-overrides ",xterm-256color:Tc" # True color support
set -s escape-time 0                      # No delay for Vim
set -g history-limit 50000                # Massive scrollback
set -g display-time 4000                  # Status messages stay longer
set -g status-interval 5                  # Refresh status more often
set -g focus-events on                    # Let apps know they have focus

# -- Ergonomic Navigation ------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
# Bind C-j untuk membuka Popup Manager
# Use Vim keys to move between panes
bind C-j display-popup -E " \
    (tmux list-sessions -F '[S] #{session_name}'; \
     ls -d */ 2>/dev/null | cut -f1 -d'/' | sed 's/^/[F] /') | \
     awk '{print (/^\[S\]/ ? \"0 \" : \"1 \") \$0}' | sort -s -k1,1 | cut -d' ' -f2- | fzf \
        --reverse \
        --header 'ENTER: Switch/Create | CTRL-R: Rename | CTRL-X: Kill' \
        --bind 'j:down,k:up' \
        --bind 'ctrl-r:execute(name=$(echo {} | cut -c5-) && read -p \"Rename \$name to: \" newname && tmux rename-session -t \"\$name\" \"\$newname\")+reload( (tmux list-sessions -F \"[S] #{session_name}\"; ls -d */ 2>/dev/null | cut -f1 -d\"/\" | sed \"s/^/[F] /\") | awk \"{print (/^\\\[S\\\]/ ? \\\"0 \\\" : \\\"1 \\\") \\\$0}\" | sort -s -k1,1 | cut -d\" \" -f2- )' \
        --bind 'ctrl-x:execute(name=$(echo {} | cut -c5-) && tmux kill-session -t \"\$name\")+reload( (tmux list-sessions -F \"[S] #{session_name}\"; ls -d */ 2>/dev/null | cut -f1 -d\"/\" | sed \"s/^/[F] /\") | awk \"{print (/^\\\[S\\\]/ ? \\\"0 \\\" : \\\"1 \\\") \\\$0}\" | sort -s -k1,1 | cut -d\" \" -f2- )' \
    | sed 's/^....//' \
    | xargs -I {} sh -c 'tmux has-session -t \"{}\" 2>/dev/null || tmux new-session -d -s \"{}\" -c \"$(pwd)/{}\"; tmux switch-client -t \"{}\"' "
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g base-index 1           # Start window numbering at 1
setw -g pane-base-index 1

# Easy Session Switching (The "v" you asked for)
bind v choose-tree -Zs
# -- macOS Style Floating Status Bar -------------------------------------------

# 1. Position and Centering
set -g status-position top
set -g status-justify centre
set -g status-interval 2

# 2. Transparent Background (Makes it look like it's floating)
set -g status-style "bg=default"

# 3. Left Side: Session Pill (Green)
set -g status-left-length 60
set -g status-left "#[fg=#a6e3a1,bg=default]#[fg=#11111b,bg=#a6e3a1,bold]󱫋 #S#[fg=#a6e3a1,bg=default]"

# 4. Right Side: Time Pill (Blue)
set -g status-right-length 60
set -g status-right "#[fg=#89b4fa,bg=default]#[fg=#11111b,bg=#89b4fa,bold]󱑎 %H:%M#[fg=#89b4fa,bg=default]"

# 5. Middle: Window Pills (Active = Orange, Inactive = Dark Gray)
setw -g window-status-separator "  " # Gap between pills
setw -g window-status-current-format "#[fg=#fab387,bg=default]#[fg=#11111b,bg=#fab387,bold]󰖯 #I:#W#[fg=#fab387,bg=default]"
setw -g window-status-format "#[fg=#313244,bg=default]#[fg=#cdd6f4,bg=#313244]#I:#W#[fg=#313244,bg=default]"

# -- Pane Borders (Minimalist macOS style) -------------------------------------
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
